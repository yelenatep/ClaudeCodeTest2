<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word of the Day 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #F4F0E6;
      --panel:         #EAE4D6;
      --surface:       #E1D9C8;
      --surface-hover: #D8CEBC;
      --text:          #221E17;
      --text-mid:      #6A5F4E;
      --text-faint:    #A89880;
      --terracotta:    #BF4018;
      --terra-glow:    rgba(191, 64, 24, 0.07);
      --teal:          #0E7A6D;
      --teal-light:    #2BB8A9;
      --teal-faint:    rgba(14, 122, 109, 0.08);
      --border:        rgba(34, 30, 23, 0.10);
      --border-mid:    rgba(34, 30, 23, 0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border-mid);
      padding: 3rem 2.2rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      animation: riseIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .site-header { flex-shrink: 0; }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .eyebrow-line {
      flex: 1;
      height: 1px;
      background: var(--terracotta);
      opacity: 0.45;
    }

    .eyebrow-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--terracotta);
    }

    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    h1 em {
      color: var(--teal-light);
      font-style: italic;
    }

    .subtitle {
      margin-top: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.2em;
      color: var(--text-faint);
      text-transform: uppercase;
    }

    .sidebar-divider {
      width: 100%;
      height: 1px;
      background: var(--border-mid);
      margin: 2.2rem 0;
      flex-shrink: 0;
    }

    /* ── Featured Panel ─────────────────────────── */
    #featured {
      display: flex;
      flex-direction: column;
      margin-top: 1.6rem;
    }

    .featured-date {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--terracotta);
      margin-bottom: 1rem;
    }

    #featured.empty .featured-date {
      display: none;
    }

    .featured-word-wrap {
      margin-bottom: 0.6rem;
    }

    .featured-word {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 3rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      line-height: 1.05;
      letter-spacing: -0.03em;
      overflow-wrap: break-word;
      word-break: break-word;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .featured-word.fade-out {
      opacity: 0;
      transform: translateY(6px);
    }

    #featured.empty .featured-word {
      color: var(--text-faint);
      font-size: 0.85rem;
      font-weight: 400;
      font-style: normal;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .featured-meta {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-top: 0.55rem;
      min-height: 1.4em;
    }

    .featured-pos {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--teal);
      border: 1px solid rgba(14, 122, 109, 0.35);
      padding: 2px 7px 3px;
      border-radius: 3px;
    }

    .featured-phonetic {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-faint);
      letter-spacing: 0.01em;
    }

    #featured.empty .featured-meta { display: none; }

    .featured-definition {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      color: var(--text-mid);
      line-height: 1.65;
      margin-top: 0.6rem;
      min-height: 1.4em;
    }

    #featured.empty .featured-definition {
      display: none;
    }

    .featured-footer {
      font-family: 'DM Mono', monospace;
      font-size: 0.64rem;
      color: var(--text-faint);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      min-height: 1em;
      margin-top: 1rem;
    }

    /* ── Main Area ──────────────────────────────── */
    .main {
      flex: 1;
      padding: 3rem 2.8rem;
      min-width: 0;
      overflow: hidden;
      animation: riseIn 0.7s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ── Month Nav ──────────────────────────────── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.6rem;
      padding-bottom: 1.6rem;
      border-bottom: 1px solid var(--border);
    }

    .month-nav h2 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 2.3rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .month-nav h2 .yr {
      font-weight: 300;
      color: var(--text-faint);
      font-size: 0.82em;
      margin-left: 0.3em;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      width: 38px;
      height: 38px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-faint);
    }

    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Calendar Grid ──────────────────────────── */
    .day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }

    .day-header {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--text-faint);
      padding: 6px 0 8px;
      text-transform: uppercase;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 13px;
      min-height: 92px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .day-cell:hover {
      background: var(--surface-hover);
      border-color: var(--border-mid);
    }

    .day-cell.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
      pointer-events: none;
    }

    .day-cell.today {
      border-left: 2px solid var(--terracotta);
      background: var(--terra-glow);
    }

    .day-cell.selected {
      background: var(--teal-faint);
      border-color: var(--teal);
    }

    .day-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text-faint);
      margin-bottom: 6px;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .day-cell.today    .day-num { color: var(--terracotta); }
    .day-cell.selected .day-num { color: var(--teal); }

    .day-word {
      font-size: 0.95rem;
      color: var(--text-mid);
      font-style: italic;
      line-height: 1.42;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .day-cell.today    .day-word { color: var(--text); }
    .day-cell.selected .day-word { color: var(--text); }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 800px) {
      body { flex-direction: column; }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        padding: 2rem 1.5rem 1.5rem;
        border-right: none;
        border-bottom: 1px solid var(--border-mid);
      }

      #featured {
        flex: none;
        margin-top: 1rem;
      }

      .sidebar-divider { margin: 1.5rem 0; }

      .featured-date { font-size: 0.95rem; margin-bottom: 0.6rem; }
      .featured-word { font-size: 2.2rem; }
      .featured-word-wrap { margin-bottom: 0; }
      .featured-definition { font-size: 0.78rem; }
      .featured-footer { margin-top: 0.5rem; }

      .main { padding: 1.5rem; }
    }

    /* ── Keyframes ──────────────────────────────── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <header class="site-header">
      <div class="eyebrow">
        <span class="eyebrow-line"></span>
        <span class="eyebrow-text">2026</span>
        <span class="eyebrow-line"></span>
      </div>
      <h1>Word of the <em>Day</em></h1>
      <p class="subtitle">a year of thinking verbs</p>
    </header>

    <div id="featured" class="empty">
      <div class="featured-date"></div>
      <div class="featured-word-wrap">
        <div class="featured-word">select a day</div>
      </div>
      <div class="featured-meta">
        <span class="featured-pos"></span>
        <span class="featured-phonetic"></span>
      </div>
      <div class="featured-definition"></div>
      <div class="featured-footer"></div>
    </div>

    <div class="sidebar-divider"></div>
  </aside>

  <main class="main">
    <div class="calendar">
      <div class="month-nav">
        <button class="nav-btn" id="prev">&#8592;</button>
        <h2 id="month-title"></h2>
        <button class="nav-btn" id="next">&#8594;</button>
      </div>
      <div class="day-headers">
        <div class="day-header">Sun</div>
        <div class="day-header">Mon</div>
        <div class="day-header">Tue</div>
        <div class="day-header">Wed</div>
        <div class="day-header">Thu</div>
        <div class="day-header">Fri</div>
        <div class="day-header">Sat</div>
      </div>
      <div class="days-grid" id="days-grid"></div>
    </div>
  </main>

  <script>
    const WORDS = [
      // January (31)
      "ideating","cogitating","vibing","ruminating","pondering",
      "deliberating","musing","contemplating","reflecting","synthesizing",
      "analyzing","theorizing","hypothesizing","reasoning","inferring",
      "deducing","intuiting","perceiving","discerning","evaluating",
      "assessing","weighing","calculating","estimating","projecting",
      "extrapolating","interpolating","abstracting","generalizing",
      "speculating","brainstorming",
      // February (28)
      "envisioning","imagining","conceptualizing","visualizing","simulating",
      "modeling","predicting","forecasting","anticipating","planning",
      "strategizing","optimizing","prioritizing","categorizing","classifying",
      "organizing","structuring","framing","reframing","questioning",
      "probing","investigating","exploring","discovering","connecting",
      "associating","linking","mapping",
      // March (31)
      "tracing","noticing","recognizing","identifying","distinguishing",
      "comparing","contrasting","juxtaposing","integrating","consolidating",
      "distilling","refining","clarifying","simplifying","elaborating",
      "expanding","narrowing","focusing","pivoting","iterating",
      "experimenting","testing","validating","verifying","benchmarking",
      "calibrating","adjusting","revisiting","reconsidering","rethinking",
      "reexamining",
      // April (30)
      "reassessing","updating","revising","troubleshooting","diagnosing",
      "decoding","interpreting","parsing","processing","computing",
      "crunching","aggregating","filtering","sorting","ranking",
      "balancing","reconciling","harmonizing","aligning","triangulating",
      "contextualizing","situating","grounding","anchoring","orienting",
      "navigating","charting","threading","weaving","bridging",
      // May (31)
      "spanning","concluding","deriving","eliciting","extracting",
      "unearthing","surfacing","articulating","formulating","constructing",
      "architecting","designing","crafting","shaping","molding",
      "picturing","wondering","marveling","doubting","challenging",
      "critiquing","auditing","reviewing","inspecting","scrutinizing",
      "examining","dissecting","decomposing","unpacking","layering","stacking",
      // June (30)
      "encoding","translating","transforming","evolving","adapting",
      "learning","absorbing","internalizing","assimilating","digesting",
      "metabolizing","marinating","steeping","brewing","percolating",
      "crystallizing","coalescing","converging","diverging","bifurcating",
      "branching","merging","unifying","mediating","oscillating",
      "vacillating","deciding","committing","resolving","finalizing",
      // July (31)
      "deconstructing","reconstructing","reimagining","reinventing","recasting",
      "refracting","retracing","rewiring","rerouting","repurposing",
      "retrofitting","retooling","noodling","tinkering","prototyping",
      "sketching","drafting","outlining","blueprinting","scaffolding",
      "incubating","hatching","developing","nurturing","cultivating",
      "maturing","ripening","concentrating","condensing","compressing","bundling",
      // August (31)
      "unfolding","revealing","illuminating","enlightening","explicating",
      "expounding","amplifying","magnifying","scanning","surveying",
      "canvassing","sampling","sensing","grasping","seizing",
      "capturing","cracking","solving","untangling","unraveling",
      "deciphering","demystifying","inverting","reversing","mirroring",
      "casting","pitching","proposing","suggesting","recommending","advocating",
      // September (30)
      "championing","defending","preserving","maintaining","sustaining",
      "supporting","bolstering","reinforcing","strengthening","fortifying",
      "solidifying","establishing","founding","rooting","planting",
      "sowing","tending","fostering","encouraging","stimulating",
      "activating","triggering","initiating","sparking","igniting",
      "fueling","energizing","motivating","inspiring","daydreaming",
      // October (31)
      "envisaging","foreseeing","premeditating","postulating","positing",
      "asserting","debating","nesting","embedding","compiling",
      "hashing","reconfiguring","reprioritizing","recalculating","rebalancing",
      "redirecting","realigning","reorienting","repositioning","presupposing",
      "germinating","seeding","bootstrapping","fiddling","toying",
      "playing","fermenting","purifying","patterning","sequencing","arranging",
      // November (30)
      "choreographing","orchestrating","conducting","composing","synchronizing",
      "tuning","fine-tuning","tweaking","polishing","perfecting",
      "honing","sharpening","centering","settling","pausing",
      "notating","annotating","cataloguing","indexing","tagging",
      "labeling","flagging","marking","highlighting","bookmarking",
      "inquiring","surmising","conjecturing","supposing","presuming",
      // December (31)
      "assuming","guessing","apprehending","comprehending","grokking",
      "resonating","targeting","drilling","unzipping","unboxing",
      "unbundling","decompiling","interrogating","sourcing","cross-checking",
      "fact-checking","stress-testing","reverse-engineering","back-calculating","forward-projecting",
      "sense-checking","gut-checking","reality-checking","pressure-testing","red-teaming",
      "sandboxing","zooming","completing","archiving","remembering","dreaming"
    ];

    const MONTHS       = ["January","February","March","April","May","June",
                          "July","August","September","October","November","December"];
    const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];

    function dayIndex(month0, day) {
      let idx = 0;
      for (let m = 0; m < month0; m++) idx += DAYS_IN_MONTH[m];
      return idx + day - 1;
    }

    const today = new Date();
    let currentMonth = (today.getFullYear() === 2026) ? today.getMonth() : 0;
    let selectedCell = null;

    async function fetchDefinition(word) {
      const defEl  = document.querySelector('#featured .featured-definition');
      const posEl  = document.querySelector('#featured .featured-pos');
      const phonEl = document.querySelector('#featured .featured-phonetic');
      defEl.textContent = posEl.textContent = phonEl.textContent = '';

      const tryWord = async (w) => {
        const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(w)}`);
        if (!r.ok) return null;
        const d = await r.json();
        const entry = d[0];
        const m = entry?.meanings?.find(x => x.partOfSpeech === 'verb') ?? entry?.meanings?.[0];
        return {
          def:      m?.definitions?.[0]?.definition ?? null,
          pos:      m?.partOfSpeech ?? null,
          phonetic: entry?.phonetic ?? entry?.phonetics?.find(p => p.text)?.text ?? null,
        };
      };

      let res = await tryWord(word).catch(() => null);
      if (!res?.def && word.includes('-'))
        res = await tryWord(word.replace(/-/g, '')).catch(() => null);
      if (!res?.def && word.endsWith('ing')) {
        const stem = word.replace(/-/g, '').slice(0, -3);
        res = await tryWord(stem).catch(() => null)
           ?? await tryWord(stem + 'e').catch(() => null);
      }

      if (res?.def)      defEl.textContent  = res.def;
      if (res?.pos)      posEl.textContent  = res.pos;
      if (res?.phonetic) phonEl.textContent = res.phonetic;
    }

    function setFeatured(month0, day, word) {
      const f    = document.getElementById('featured');
      const wEl  = f.querySelector('.featured-word');
      const dEl  = f.querySelector('.featured-date');
      const ftEl = f.querySelector('.featured-footer');

      wEl.classList.add('fade-out');
      setTimeout(() => {
        f.classList.remove('empty');
        dEl.textContent  = `${MONTHS[month0]} ${day}, 2026`;
        wEl.textContent  = word;
        const n = dayIndex(month0, day) + 1;
        ftEl.textContent = `day ${n} of 365 · thinking verb`;
        wEl.classList.remove('fade-out');
        fetchDefinition(word);
      }, 160);
    }

    function render() {
      const grid = document.getElementById('days-grid');
      document.getElementById('month-title').innerHTML =
        `${MONTHS[currentMonth]} <span class="yr">2026</span>`;
      document.getElementById('prev').disabled = currentMonth === 0;
      document.getElementById('next').disabled = currentMonth === 11;
      grid.innerHTML = '';

      const firstDow = new Date(2026, currentMonth, 1).getDay();
      for (let i = 0; i < firstDow; i++) {
        const blank = document.createElement('div');
        blank.className = 'day-cell empty';
        grid.appendChild(blank);
      }

      const days = DAYS_IN_MONTH[currentMonth];
      for (let d = 1; d <= days; d++) {
        const word = WORDS[dayIndex(currentMonth, d)];
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        if (today.getFullYear() === 2026 && today.getMonth() === currentMonth && today.getDate() === d)
          cell.classList.add('today');

        cell.innerHTML = `<div class="day-num">${d}</div><div class="day-word">${word}</div>`;
        cell.addEventListener('click', () => {
          if (selectedCell) selectedCell.classList.remove('selected');
          cell.classList.add('selected');
          selectedCell = cell;
          setFeatured(currentMonth, d, word);
        });
        grid.appendChild(cell);
      }
    }

    document.getElementById('prev').addEventListener('click', () => {
      currentMonth--; selectedCell = null; render();
    });
    document.getElementById('next').addEventListener('click', () => {
      currentMonth++; selectedCell = null; render();
    });

    render();
  </script>
</body>
</html>
